  <style>
    :root {
      --green:#4ade80;--dark-green:#166534;--gold:#fbbf24;--sky:#0ea5e9;

    .option-card{background:var(--surface);border:2px solid var(--border);border-top:4px solid var(--green);padding:20px;text-align:center;cursor:pointer;}
    .option-card:hover{border-color:var(--green);transform:translateY(-5px);}
    .option-card .emoji{font-size:2.8rem;margin-bottom:10px;}

    /* Rewards */
    .username-input, .claim-btn, .spin-btn {
      width: 100%; max-width: 400px; padding: 15px; margin: 15px auto; display: block;
      background: var(--surface2); border: 3px solid var(--green); color: white; font-size: 1.1rem;
    }
    .claim-btn, .spin-btn { background: var(--green); color: black; font-weight: bold; cursor: pointer; }

    .reset-all-btn {
      background: #991b1b;
      color: white;
      padding: 12px 24px;
      margin: 30px auto;
      display: block;
      border: none;
      border-radius: 4px;

    .wheel-container { position: relative; width: 320px; max-width: 90%; margin: 30px auto; }
    #wheel { width: 100%; border: 12px solid var(--green); border-radius: 50%; box-shadow: 0 0 30px var(--green); }
    .pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 3rem; z-index: 10; }
    #spin-result { margin-top: 20px; font-size: 1.3rem; color: var(--gold); text-align: center; min-height: 70px; font-weight: bold; }

    #toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:2px solid var(--green);color:var(--green);padding:12px 20px;font-family:'Press Start 2P',monospace;z-index:9999;opacity:0;transition:opacity 0.3s;}
    #toast.show{opacity:1;}

<!-- HOME -->
<div class="page active" id="home">
  <div class="hero">
    <h1>Mr.Sikandar's Lapata SMP</h1>
    <p style="font-family:'VT323',monospace;font-size:1.3rem;color:#94a3b8;">The Ultimate Survival SMP</p>
    <div class="ip-tag" onclick="copyIP()">fakelapataop.aternos.me:43833</div>
  </div>

  <div class="options-grid" style="max-width:900px;margin:0 auto;padding:0 15px;">
    <div class="option-card" onclick="showTab('appeal')"><div class="emoji">📝</div><div style="font-family:'Press Start 2P';color:var(--green);">APPEAL</div></div>

<!-- REWARDS -->
<div class="page" id="rewards">
  <div style="max-width:900px;margin:0 auto;padding:20px;">
    <h2 style="text-align:center;color:var(--green);margin-bottom:20px;">🎁 Daily Rewards & Spinner</h2>
    
    <input type="text" id="username" placeholder="Enter Your Minecraft Username" class="username-input">

    <div style="text-align:center;margin:20px 0;">
      <button id="dailyBtn" class="claim-btn">Claim Daily Reward</button>

    <!-- New Reset All Button -->
    <button id="resetAllBtn" class="reset-all-btn">
      🔄 RESET ALL PLAYER DATA
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== SPINNER ====================
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
let isSpinning = false;

const segments = [
  { text: "1 Hit Sword",     color: "#ff4444", weight: 1 },
  { text: "Try Again",       color: "#555555", weight: 28 },
  { text: "500k Money",      color: "#44ff44", weight: 20 },
  { text: "Try Again",       color: "#555555", weight: 15 },
  { text: "5 Million!",      color: "#ffdd00", weight: 8 },
  { text: "Try Again",       color: "#555555", weight: 12 },
  { text: "100k Money",      color: "#44ff44", weight: 20 },
  { text: "Netherite Set",   color: "#aa66ff", weight: 10 }
];

function drawWheel(rotation = 0) {
  ctx.clearRect(0, 0, 320, 320);
  const cx = 160, cy = 160, radius = 140;
  const step = (Math.PI * 2) / segments.length;

  for (let i = 0; i < segments.length; i++) {
    const start = i * step + rotation;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, start, start + step);
    ctx.closePath();
    ctx.fillStyle = segments[i].color;
    ctx.fill();
    ctx.strokeStyle = "#111"; ctx.lineWidth = 6; ctx.stroke();

    const mid = start + step / 2;
    const tx = cx + Math.cos(mid) * 92;
    const ty = cy + Math.sin(mid) * 92;
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI / 2);
    ctx.font = "bold 10.5px Arial";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.fillText(segments[i].text, 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, radius + 16, 0, Math.PI * 2);
  ctx.strokeStyle = "#00ff41";
  ctx.lineWidth = 18;
  ctx.stroke();
}

function getPrize() {
  let total = segments.reduce((sum, s) => sum + s.weight, 0);
  let rand = Math.random() * total;
  let sum = 0;
  for (let seg of segments) {
    sum += seg.weight;
    if (rand <= sum) return seg;
  }
  return segments[0];
}

// ==================== DAILY REWARD + RESET ====================
const STORAGE = { username: 'mcUsername', streak: 'dailyStreak', lastClaim: 'lastDailyClaim', lastSpin: 'lastSpinDate', bonusSpinsToday: 'bonusSpinsToday' };
const NODEJS_URL = "https://990bcd1e-2e9d-4b31-95ae-d02835f0239c-00-1qirfplstlop.pike.replit.dev";
const API_KEY = "Sikandar123";

const dailyRewards = {
  1: "10k Reward",
  2: "50k Reward",
  3: "Netherite kit",
  4: "1 Heart + 100k Reward",
  5: "1 Bonus Spin",
  6: "2 Bonus Spins",
  7: "1 Million + 2 Spins"
};

async function claimDaily() {
  const username = document.getElementById('username').value.trim();
  if (!username) return alert("Please enter your Minecraft username!");

  const today = getToday();
  if (localStorage.getItem(STORAGE.lastClaim) === today) return alert("You already claimed today!");

  let streak = parseInt(localStorage.getItem(STORAGE.streak) || 0) + 1;
  localStorage.setItem(STORAGE.streak, streak);
  localStorage.setItem(STORAGE.lastClaim, today);

  const day = ((streak - 1) % 7) + 1;
  const rewardText = dailyRewards[day];

  let bonus = 0;
  if (day === 5) bonus = 1;
  if (day === 6) bonus = 2;
  if (day === 7) bonus = 2;

  if (bonus > 0) {
    let cur = parseInt(localStorage.getItem(STORAGE.bonusSpinsToday) || 0);
    localStorage.setItem(STORAGE.bonusSpinsToday, cur + bonus);
  }

  await sendRewardToBot(username, rewardText, true);

  alert(`✅ Day ${streak} Claimed!\nYou received: ${rewardText}`);
  updateStreakDisplay();
  updateSpinsDisplay();
}

async function sendRewardToBot(username, reward, isDaily = false) {
  try {
    const body = { username, reward, key: API_KEY };
    if (isDaily) body.broadcast = `${username} Have Visited`;
    await fetch(`${NODEJS_URL}/reward`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
  } catch(e) {}
}

// Reset All Data Function
function resetAllData() {
  if (!confirm("⚠️ WARNING!\n\nThis will RESET ALL player data for everyone who visited this site.\n\nStreak, spins, last claim dates — everything will be deleted.\n\nAre you sure?")) {
    return;
  }

  localStorage.clear();   // Clears everything

  alert("✅ ALL PLAYER DATA HAS BEEN RESET SUCCESSFULLY!\n\nEveryone can now claim daily reward and spin again.");
  
  // Refresh displays
  updateStreakDisplay();
  updateSpinsDisplay();
  document.getElementById('username').value = '';
}

// Helpers
function getToday() { return new Date().toISOString().split('T')[0]; }
function getAvailableSpins() {
  let bonus = parseInt(localStorage.getItem(STORAGE.bonusSpinsToday) || 0);
  return bonus + (localStorage.getItem(STORAGE.lastSpin) !== getToday() ? 1 : 0);
}
function consumeSpin() {
  let bonus = parseInt(localStorage.getItem(STORAGE.bonusSpinsToday) || 0);
  if (bonus > 0) localStorage.setItem(STORAGE.bonusSpinsToday, bonus - 1);
  else localStorage.setItem(STORAGE.lastSpin, getToday());
}
function updateStreakDisplay() { document.getElementById('streak-day').textContent = localStorage.getItem(STORAGE.streak) || 0; }
function updateSpinsDisplay() { document.getElementById('spins-count').textContent = getAvailableSpins(); }

function showTab(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  if (page === 'rewards') {
    drawWheel(0);
    updateStreakDisplay();
    updateSpinsDisplay();
  }
}

function copyIP() {
  navigator.clipboard.writeText('fakelapataop.aternos.me:43833');
  showToast('✅ IP Copied!');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
window.addEventListener('load', () => {
  drawWheel(0);

  const uname = document.getElementById('username');
  uname.value = localStorage.getItem(STORAGE.username) || '';
  uname.addEventListener('input', () => localStorage.setItem(STORAGE.username, uname.value.trim()));

  document.getElementById('spinBtn').addEventListener('click', startSpin);
  document.getElementById('dailyBtn').addEventListener('click', claimDaily);
  
  // New Reset Button
  document.getElementById('resetAllBtn').addEventListener('click', resetAllData);

  updateStreakDisplay();
  updateSpinsDisplay();
});
</script>
