<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="222132" async data-cfasync="false"></script>
<meta name="monetag" content="0f6c950c986b798d6df9bf08d49fbcf8">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mr.Sikandar's Lapata SMP</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>

<style>
:root {
--green:#4ade80;--dark-green:#166534;--gold:#fbbf24;--sky:#0ea5e9;
--bg:#0f172a;--surface:#1e293b;--surface2:#263048;--border:#334155;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#e2e8f0;font-family:'Nunito',sans-serif;min-height:100vh;}

nav{background:var(--surface);border-bottom:3px solid var(--green);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:60px;}
.nav-logo{font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--green);}
.nav-links{display:flex;gap:8px;flex-wrap:wrap;}
.nav-link{font-family:'VT323',monospace;font-size:1.1rem;color:#94a3b8;padding:8px 12px;cursor:pointer;border-bottom:2px solid transparent;}
.nav-link:hover,.nav-link.active{color:var(--green);border-bottom-color:var(--green);}

.page{display:none;}
.page.active{display:block;}

.hero{text-align:center;padding:40px 20px;}
h1{font-family:'Press Start 2P',monospace;font-size:2rem;color:var(--green);margin:10px 0;}
.ip-tag{background:rgba(14,165,233,0.15);border:1px solid #0ea5e9;color:#0ea5e9;padding:8px 16px;border-radius:4px;cursor:pointer;display:inline-block;margin:10px 0;}

.options-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:15px;margin:30px 0;}
.option-card{background:var(--surface);border:2px solid var(--border);border-top:4px solid var(--green);padding:20px;text-align:center;cursor:pointer;}
.option-card:hover{border-color:var(--green);transform:translateY(-5px);}
.option-card .emoji{font-size:2.8rem;margin-bottom:10px;}

.username-input, .claim-btn, .spin-btn {
width: 100%; max-width: 400px; padding: 15px; margin: 15px auto; display: block;
background: var(--surface2); border: 3px solid var(--green); color: white; font-size: 1.1rem;
}
.claim-btn, .spin-btn { background: var(--green); color: black; font-weight: bold; cursor: pointer; }

.wheel-container { position: relative; width: 320px; max-width: 90%; margin: 30px auto; }
#wheel { width: 100%; border: 12px solid var(--green); border-radius: 50%; box-shadow: 0 0 30px var(--green); }
.pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 3rem; z-index: 10; }

#spin-result { margin-top: 20px; font-size: 1.3rem; color: var(--gold); text-align: center; min-height: 70px; font-weight: bold; }

#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:2px solid var(--green);color:var(--green);padding:12px 20px;font-family:'Press Start 2P',monospace;z-index:9999;opacity:0;transition:opacity 0.3s;}
#toast.show{opacity:1;}
</style>
</head>

<body>

<nav>
<div class="nav-logo">Mr.Sikandar's Lapata SMP</div>
<div class="nav-links">
<span class="nav-link active" onclick="showTab('home')">🏠 Home</span>
<span class="nav-link" onclick="showTab('rewards')">🎁 Rewards</span>
</div>
</nav>

<div class="page active" id="home">
<div class="hero">
<h1>Mr.Sikandar's Lapata SMP</h1>
<p style="font-family:'VT323',monospace;font-size:1.3rem;color:#94a3b8;">The Ultimate Survival SMP</p>
<div class="ip-tag" onclick="copyIP()">fakelapataop.aternos.me:43833</div>
</div>
</div>

<div class="page" id="rewards">
<div style="max-width:900px;margin:0 auto;padding:20px;">
<h2 style="text-align:center;color:var(--green);margin-bottom:20px;">🎁 Daily Rewards & Spinner</h2>

<input type="text" id="username" placeholder="Enter Your Minecraft Username" class="username-input">

<div style="text-align:center;margin:20px 0;">
<button id="dailyBtn" class="claim-btn">Claim Daily Reward</button>
<p>Streak: <span id="streak-day">0</span> days | Spins Left: <span id="spins-count">1</span></p>
</div>

<div class="wheel-container">
<div class="pointer">▼</div>
<canvas id="wheel" width="320" height="320"></canvas>
<button id="spinBtn" class="spin-btn">SPIN NOW</button>
</div>

<p id="spin-result"></p>
</div>
</div>

<div id="toast"></div>

<script>
const STORAGE = { username:'mcUsername', streak:'dailyStreak', lastClaim:'lastDailyClaim', lastSpin:'lastSpinDate', bonusSpinsToday:'bonusSpinsToday' };

function getToday(){ return new Date().toISOString().split('T')[0]; }

function getAvailableSpins(){
let bonus=parseInt(localStorage.getItem(STORAGE.bonusSpinsToday)||0);
return bonus+(localStorage.getItem(STORAGE.lastSpin)!==getToday()?1:0);
}

function consumeSpin(){
let bonus=parseInt(localStorage.getItem(STORAGE.bonusSpinsToday)||0);
if(bonus>0) localStorage.setItem(STORAGE.bonusSpinsToday,bonus-1);
else localStorage.setItem(STORAGE.lastSpin,getToday());
}

function updateStreakDisplay(){ document.getElementById('streak-day').textContent=localStorage.getItem(STORAGE.streak)||0; }
function updateSpinsDisplay(){ document.getElementById('spins-count').textContent=getAvailableSpins(); }

async function claimDaily(){
const username=document.getElementById('username').value.trim();
if(!username)return alert("Enter username");

const today=getToday();
if(localStorage.getItem(STORAGE.lastClaim)===today) return alert("Already claimed");

let streak=parseInt(localStorage.getItem(STORAGE.streak)||0)+1;
localStorage.setItem(STORAGE.streak,streak);
localStorage.setItem(STORAGE.lastClaim,today);

alert("Daily reward claimed!");
updateStreakDisplay();
updateSpinsDisplay();
}

document.getElementById('dailyBtn').onclick=claimDaily;

window.onload=()=>{
updateStreakDisplay();
updateSpinsDisplay();
}
</script>

</body>
</html>
